
<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Base GuestBook</title>
  <style>
    :root {
      --base-blue: #0052ff; --base-blue-dark: #003ecc;
      --bg: #0a0a0f; --surface: #14141c;
      --text: #f5f5fa; --text-dim: #8a8a99;
      --border: #2a2a3a; --warn: #ff9d00;
    }
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
      background: var(--bg); color: var(--text);
      min-height: 100vh; display: flex; flex-direction: column; line-height: 1.5;
    }
    header { padding: 2rem 1rem; text-align: center; border-bottom: 1px solid var(--border); }
    header h1 {
      font-size: 2.5rem; margin-bottom: 0.5rem;
      background: linear-gradient(135deg, var(--base-blue), #5b8eff);
      -webkit-background-clip: text; -webkit-text-fill-color: transparent; background-clip: text;
    }
    header p { color: var(--text-dim); }
    main { flex: 1; max-width: 720px; width: 100%; margin: 0 auto; padding: 2rem 1rem; }
    section {
      background: var(--surface); border: 1px solid var(--border);
      border-radius: 12px; padding: 1.5rem; margin-bottom: 1rem;
    }
    section h2 { margin-bottom: 1rem; font-size: 1.25rem; }
    button {
      background: var(--base-blue); color: white; border: none;
      padding: 0.75rem 1.5rem; border-radius: 8px;
      font-size: 1rem; font-weight: 600; cursor: pointer; transition: background 0.15s;
    }
    button:hover { background: var(--base-blue-dark); }
    button:disabled { background: var(--border); cursor: not-allowed; }
    #wallet-status {
      margin-top: 1rem; color: var(--text-dim);
      font-family: ui-monospace, "SF Mono", Menlo, monospace; font-size: 0.9rem;
    }
    .addr {
      color: var(--text); font-family: ui-monospace, "SF Mono", Menlo, monospace;
      background: var(--bg); padding: 0.15rem 0.5rem;
      border-radius: 4px; border: 1px solid var(--border);
    }
    .warn-banner {
      background: rgba(255, 157, 0, 0.1); border: 1px solid var(--warn);
      color: var(--warn); padding: 0.75rem 1rem; border-radius: 8px;
      margin-top: 1rem; font-size: 0.9rem;
    }
    .warn-banner button {
      background: var(--warn); color: var(--bg);
      padding: 0.4rem 0.8rem; font-size: 0.85rem; margin-left: 0.5rem;
    }
    .stat {
      font-size: 2.5rem; font-weight: 700;
      color: var(--base-blue);
    }
    .stat-label { color: var(--text-dim); font-size: 0.875rem; }
    footer {
      padding: 1.5rem; text-align: center; border-top: 1px solid var(--border);
      color: var(--text-dim); font-size: 0.875rem;
    }
  </style>
</head>
<body>
  <header>
    <h1>Base GuestBook</h1>
    <p>An on-chain guestbook on the Base network.</p>
  </header>

  <main>
    <section id="wallet-section">
      <button id="connect-btn">Connect Wallet</button>
      <p id="wallet-status">Not connected</p>
      <div id="network-warning" style="display: none;"></div>
    </section>

    <section id="stats-section" style="display: none;">
      <h2>Stats</h2>
      <div class="stat" id="total-entries">—</div>
      <div class="stat-label">Total messages signed</div>
    </section>
  </main>

  <footer>
    <p>Powered by Base.</p>
  </footer>

  <script type="module">
    import { BrowserProvider, Contract } from "https://cdn.jsdelivr.net/npm/ethers@6.13.0/+esm";

    const CONTRACT_ADDRESS = "0x701546B92991CAC01f98c9aaB3AB8C8dd6d1999f";
    const CONTRACT_ABI = [
      "function sign(string calldata _message) external",
      "function getEntry(uint256 _id) external view returns (address, string memory, uint256)",
      "function totalEntries() external view returns (uint256)",
      "event MessageSigned(address indexed author, string message, uint256 timestamp, uint256 indexed entryId)"
    ];

    const BASE_CHAIN_ID = 8453n;
    const BASE_CHAIN_HEX = "0x2105";

    const connectBtn = document.getElementById("connect-btn");
    const walletStatus = document.getElementById("wallet-status");
    const networkWarning = document.getElementById("network-warning");
    const statsSection = document.getElementById("stats-section");
    const totalEntriesEl = document.getElementById("total-entries");

    let provider = null;
    let signer = null;
    let contract = null;

    function shortenAddress(addr) {
      return `${addr.slice(0, 6)}…${addr.slice(-4)}`;
    }

    async function loadStats() {
      try {
        const total = await contract.totalEntries();
        totalEntriesEl.textContent = total.toString();
        statsSection.style.display = "block";
      } catch (err) {
        console.error("Failed to load stats:", err);
      }
    }

    async function checkNetwork() {
      const network = await provider.getNetwork();
      if (network.chainId !== BASE_CHAIN_ID) {
        networkWarning.innerHTML = `
          <div class="warn-banner">
            Wrong network. Switch to Base mainnet.
            <button id="switch-btn">Switch</button>
          </div>
        `;
        networkWarning.style.display = "block";
        document.getElementById("switch-btn").addEventListener("click", switchToBase);
        return false;
      }
      networkWarning.style.display = "none";
      return true;
    }

    async function switchToBase() {
      try {
        await window.ethereum.request({
          method: "wallet_switchEthereumChain",
          params: [{ chainId: BASE_CHAIN_HEX }],
        });
      } catch (err) {
        if (err.code === 4902) {
          await window.ethereum.request({
            method: "wallet_addEthereumChain",
            params: [{
              chainId: BASE_CHAIN_HEX, chainName: "Base",
              nativeCurrency: { name: "Ether", symbol: "ETH", decimals: 18 },
              rpcUrls: ["https://mainnet.base.org"],
              blockExplorerUrls: ["https://basescan.org"],
            }],
          });
        }
      }
    }

    async function connectWallet() {
      if (!window.ethereum) {
        walletStatus.textContent = "No wallet detected. Install MetaMask or Rabby.";
        return;
      }
      try {
        provider = new BrowserProvider(window.ethereum);
        await provider.send("eth_requestAccounts", []);
        signer = await provider.getSigner();
        const address = await signer.getAddress();
        walletStatus.innerHTML = `Connected: <span class="addr">${shortenAddress(address)}</span>`;
        connectBtn.textContent = "Connected";
        connectBtn.disabled = true;

        const ok = await checkNetwork();
        if (ok) {
          contract = new Contract(CONTRACT_ADDRESS, CONTRACT_ABI, signer);
          await loadStats();
        }
      } catch (err) {
        walletStatus.textContent = `Error: ${err.message}`;
      }
    }

    connectBtn.addEventListener("click", connectWallet);

    if (window.ethereum) {
      window.ethereum.on("chainChanged", () => window.location.reload());
      window.ethereum.on("accountsChanged", () => window.location.reload());
    }
  </script>
</body>
</html>
